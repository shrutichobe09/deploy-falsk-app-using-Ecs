# apiVersion: v1
# kind: Service
# metadata:
#   name: flask-service
# spec:
#   type: NodePort
#   selector:
#     app: flask-app
#   ports:
#   - port: 80
#     targetPort: 5000
#     nodePort: 30001




service:
  name: flask-service
  identifier: flaskservice

  serviceDefinition:
    type: Kubernetes
    spec:
      manifests:
        - manifest:
            identifier: flaskmanifest
            type: K8sManifest
            spec:
              store:
                type: Github
                spec:
                  connectorRef: harnessgitconnector
                  gitFetchType: Branch
                  paths:
                    - k8s/deployment.yaml
                    - k8s/service.yaml
                  branch: main

              skipResourceVersioning: false
              enableDeclarativeRollback: false

      artifacts:
        primary:
          primaryArtifactRef: flaskartifact
          sources:
            - identifier: flaskartifact
              type: DockerRegistry
              spec:
                connectorRef: dockerhubconnector
                imagePath: saiteja4751/flask-demo
                tag: latest

  gitOpsEnabled: false