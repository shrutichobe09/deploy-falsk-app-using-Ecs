<!DOCTYPE html>
<html>
<head>
    <title>{{ data.title }}</title>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: #1e293b;
            width: 60%;
            margin: auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(255,255,255,0.2);
        }

        h1 {
            color: #38bdf8;
        }

        p {
            font-size: 22px;
        }

        .emoji {
            font-size: 40px;
        }
    </style>
</head>

<body>
    <h1 style="display: grid;"> WAFORGE </h1>
    <div class="container">
        <h1>{{ data.title }}</h1>

        <p>{{ data.message }}</p>

        <div class="emoji">
            {{ data.emoji }}
        </div>

        <h3>Created By {{ data.author }}</h3>
    </div>

</body>
</html>
